version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: blinders-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: blinders_db
      MYSQL_USER: blinders_user
      MYSQL_PASSWORD: blinders_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database_setup.sql:/docker-entrypoint-initdb.d/database_setup.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - blinders-network

  app:
    build: .
    container_name: blinders-app
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/blinders_db?useSSL=false&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: password
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - blinders-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: blinders-phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: password
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - blinders-network

volumes:
  mysql_data:

networks:
  blinders-network:
    driver: bridge
